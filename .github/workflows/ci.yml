name: Wordsmith CI

on:
  push:
    branches:
      - main

permissions:
  contents: write

env:
  IMAGE_TAG: ${{ github.sha }}

jobs:
  docker:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push web image
        uses: docker/build-push-action@v5
        with:
          context: ./web
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/wordsmith-web:${{ env.IMAGE_TAG }}
            ${{ secrets.DOCKERHUB_USERNAME }}/wordsmith-web:latest

      - name: Build and push api image
        uses: docker/build-push-action@v5
        with:
          context: ./words
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/wordsmith-api:${{ env.IMAGE_TAG }}
            ${{ secrets.DOCKERHUB_USERNAME }}/wordsmith-api:latest

      - name: Show published tags
        run: |
          echo "Published:"
          echo "${{ secrets.DOCKERHUB_USERNAME }}/wordsmith-web:${IMAGE_TAG}"
          echo "${{ secrets.DOCKERHUB_USERNAME }}/wordsmith-web:latest"
          echo "${{ secrets.DOCKERHUB_USERNAME }}/wordsmith-api:${IMAGE_TAG}"
          echo "${{ secrets.DOCKERHUB_USERNAME }}/wordsmith-api:latest"

      - name: Update Kubernetes manifests with commit SHA
        run: |
          sed -i "s|image: .*wordsmith-web:.*|image: ${{ secrets.DOCKERHUB_USERNAME }}/wordsmith-web:${IMAGE_TAG}|" k8s/web-deployment.yaml
          sed -i "s|image: .*wordsmith-api:.*|image: ${{ secrets.DOCKERHUB_USERNAME }}/wordsmith-api:${IMAGE_TAG}|" k8s/api-deployment.yaml

      - name: Commit manifest updates
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add k8s/web-deployment.yaml k8s/api-deployment.yaml
          git diff --cached --quiet || git commit -m "chore: update image tags to ${IMAGE_TAG} [skip ci]"
          git push
